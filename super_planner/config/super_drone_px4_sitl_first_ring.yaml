fsm:
  click_goal_en: true
  click_goal_topic: "/planning/click_goal"
  click_height: -10.0
  click_yaw_en: false
  replan_rate: 8.0
  cmd_topic: "/position_cmd"
  mpc_cmd_topic: "/planning_cmd/poly_traj"
  timer_en: true

super_planner:
  backup_traj_en: true
  detailed_log_en: false
  visualization_en: true
  use_fov_cut: false
  print_log: false
  visual_process: false
  frontend_in_known_free: false
  goal_yaw_en: false
  goal_vel_en: false
  corridor_bound_dis: 0.9
  corridor_line_max_length: 1.0
  safe_corridor_line_max_length: 4.0
  iris_iter_num: 2
  obs_skip_num: 2
  replan_forward_dt: 0.18
  planning_horizon: 5.0
  sensing_horizon: -1
  receding_dis: 1.2
  robot_r: 0.2
  yaw_dot_max: 1.5
  yaw_mode: 1
  mpc_horizon: 12

traj_opt:
  switch:
    save_log_en: false
    print_optimizer_log: false

  boundary:
    max_vel: 1.2
    max_acc: 2.0
    max_jerk: 20.0
    max_omg: 1.5
    max_acc_thr: 14.0
    min_acc_thr: 6.0
    penna_margin: 0.08

  exp_traj:
    pos_constraint_type: 1
    energy_cost_type: 4
    block_energy_cost: false
    opt_accuracy: 5.0e-6
    scale_factor: 1.0
    integral_reso: 15
    smooth_eps: 0.01
    penna_t: 1.0e+6
    penna_pos: 5.0e+8
    penna_vel: 5.0e+7
    penna_acc: 5.0e+7
    penna_jerk: -5.0e+7
    penna_attract: 5.0e+7
    penna_omg: -1
    penna_thr: -1

  backup_traj:
    uniform_time_en: true
    pos_constraint_type: 1
    piece_num: 2
    energy_cost_type: 4
    block_energy_cost: true
    opt_accuracy: 1.0e-6
    scale_factor: 1.0
    integral_reso: 12
    smooth_eps: 0.01
    penna_t: 5.0e+3
    penna_ts: 1.0e+6
    penna_pos: 1.0e+8
    penna_vel: 1.0e+7
    penna_acc: 1.0e+7
    penna_jerk: -1.0e+6
    penna_omg: -1
    penna_thr: -1

  flatness:
    mass: 1.64
    dh: 0.35
    dv: 0.35
    cp: 0.001
    v_eps: 0.0001
    grav: 9.81

astar:
  map_voxel_num: [ 500, 500, 100 ]
  visual_process: false
  allow_diag: true
  heu_type: 2
  debug_visualization_en: false

rog_map:
  resolution: 0.1
  inflation_resolution: 0.2
  inflation_step: 2
  unk_inflation_en: false
  unk_inflation_step: 1
  map_size: [ 20, 20, 4 ]
  fix_map_origin: [ 0, 0, 0.0 ]
  frontier_extraction_en: false

  virtual_ceil_height: 3.5
  virtual_ground_height: -1.0

  load_pcd_en: false

  map_sliding:
    enable: true
    threshold: 0.3

  esdf:
    enable: false
    resolution: 0.1
    local_update_box: [ 5, 5, 3 ]

  ros_callback:
    enable: true
    cloud_topic: "/cloud_registered"
    odom_topic: "/Odom_high_freq"
    odom_timeout: 2.0

  visualization:
    enable: true
    use_dynamic_reconfigure: false
    time_rate: 2
    frame_rate: 0
    range: [ 15, 15, 4 ]
    frame_id: "world"
    pub_unknown_map_en: false

  intensity_thresh: -10
  point_filt_num: 1

  raycasting:
    enable: false
    batch_update_size: 1
    local_update_box: [ 100, 100, 5 ]
    ray_range: [ 0.5, 100 ]
    p_min: 0.12
    p_miss: 0.49
    p_free: 0.499
    p_occ: 0.85
    p_hit: 0.9
    p_max: 0.98
    unk_thresh: 1.0
